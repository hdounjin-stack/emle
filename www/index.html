/* ================= GLOBAL SEARCH ================= */
const searchResultsEl = document.getElementById("searchResults");
let searchDebounceTimer = null;
document.getElementById("searchBox").addEventListener("input",(e)=>{
  clearTimeout(searchDebounceTimer);
  const val = e.target.value;
  searchDebounceTimer = setTimeout(()=> runSearch(val), 150);
});
function runSearch(rawVal){
  const q = rawVal.trim().toLowerCase();
  if(!q){ gridEl.style.display="grid"; searchResultsEl.innerHTML=""; return; }
  gridEl.style.display="none";

  let html = "";
  DATA.forEach(section=>{
    const matches = [];
    section.themes.forEach((th,ti)=>{
      if(isThemeHidden(section.id, ti)) return;
      th.topics.forEach((tp,pi)=>{
        if(isTopicHidden(section.id, ti, pi)) return;
        if(tp.toLowerCase().includes(q)) matches.push({tp,ti,pi,themeName:th.name});
      });
    });
    if(matches.length===0) return;
    html += `<div class="glass" style="padding:16px 18px;margin-bottom:14px;border-radius:20px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div class="tile-icon" style="width:34px;height:34px;font-size:16px;background:${section.color}33">${section.icon}</div>
        <div style="font-weight:800;font-size:15px;">${section.title}</div>
        <button class="mini-btn" style="margin-inline-start:auto;" data-open-section="${section.id}">فتح القسم</button>
      </div>`;
    matches.forEach(m=>{
      const key = topicKey(section.id, m.ti, m.pi);
      const isDone = !!progress[key];
      html += `<div class="topic-row${isDone?" done":""}" style="cursor:pointer;" data-jump-section="${section.id}" data-jump-ti="${m.ti}" data-jump-pi="${m.pi}">
        <span>${isDone?"✅":"⬜"}</span><label>${m.tp} <span style="color:var(--muted);font-size:11px;">— ${m.themeName}</span></label>
      </div>`;
    });
    html += `</div>`;
  });
  searchResultsEl.innerHTML = html || `<div class="empty-state">لا توجد نتائج</div>`;

  searchResultsEl.querySelectorAll("[data-open-section]").forEach(el=>{
    el.addEventListener("click",()=>{
      const id = el.dataset.openSection;
      if(getViewMode()==="list") openModal(id);
      else openSectionDashboard(id);
    });
  });
  searchResultsEl.querySelectorAll("[data-jump-section]").forEach(el=>{
    el.addEventListener("click",()=>{
      const id = el.dataset.jumpSection;
      const ti = parseInt(el.dataset.jumpTi);
      const pi = parseInt(el.dataset.jumpPi);
      if(getViewMode()==="list"){
        openModal(id, "", ti, pi);
      } else {
        openThemeDashboard(id, ti);
      }
    });
  });
}

function showToast(msg){

/* ================= CUSTOM DIALOGS (replace native prompt/confirm/alert,
   which are unreliable or silently blocked inside installed PWAs) ================= */
const dialogOverlay = document.getElementById("dialogOverlay");
const dialogTitle = document.getElementById("dialogTitle");
const dialogMessage = document.getElementById("dialogMessage");
const dialogInput = document.getElementById("dialogInput");
const dialogOk = document.getElementById("dialogOk");
const dialogCancel = document.getElementById("dialogCancel");
const dialogClose = document.getElementById("dialogClose");
let _dialogResolve = null;

function _closeDialog(result){
  dialogOverlay.classList.remove("open");
  if(_dialogResolve){ const r = _dialogResolve; _dialogResolve = null; r(result); }
}
dialogCancel.addEventListener("click", ()=> _closeDialog(null));
dialogClose.addEventListener("click", ()=> _closeDialog(null));
dialogOverlay.addEventListener("click", (e)=>{ if(e.target===dialogOverlay) _closeDialog(null); });
dialogOk.addEventListener("click", ()=>{
  if(dialogInput.style.display!=="none"){
    _closeDialog(dialogInput.value.trim() || null);
  } else {
    _closeDialog(true);
  }
});
dialogInput.addEventListener("keydown",(e)=>{ if(e.key==="Enter") dialogOk.click(); });

function customPrompt(title, defaultValue=""){
  return new Promise((resolve)=>{
    _dialogResolve = resolve;
    dialogTitle.textContent = title;
    dialogMessage.style.display = "none";
    dialogInput.style.display = "block";
    dialogInput.value = defaultValue;
    dialogOk.textContent = "تأكيد";
    dialogCancel.style.display = "inline-flex";
    dialogOverlay.classList.add("open");
    setTimeout(()=> dialogInput.focus(), 50);
  });
}
function customConfirm(title, message){
  return new Promise((resolve)=>{
    _dialogResolve = resolve;
    dialogTitle.textContent = title;
    dialogMessage.textContent = message || "";
    dialogMessage.style.display = "block";
    dialogInput.style.display = "none";
    dialogOk.textContent = "تأكيد";
    dialogCancel.style.display = "inline-flex";
    dialogOverlay.classList.add("open");
  });
}
function customAlert(title, message){
  return new Promise((resolve)=>{
    _dialogResolve = resolve;
    dialogTitle.textContent = title;
    dialogMessage.textContent = message || "";
    dialogMessage.style.display = "block";
    dialogInput.style.display = "none";
    dialogOk.textContent = "حسناً";
    dialogCancel.style.display = "none";
    dialogOverlay.classList.add("open");
  });
}

function exportData(){
  const payload = {progress, resources, activity};
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "emle_progress_" + new Date().toISOString().slice(0,10) + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("تم تصدير التقدم بنجاح");
}
document.getElementById("importFile") // created below in body via settings, but declare handler container
;
const importFileInput = document.createElement("input");
importFileInput.type = "file";
importFileInput.accept = ".json";
importFileInput.id = "importFile";
importFileInput.style.display = "none";
document.body.appendChild(importFileInput);
importFileInput.addEventListener("change",(e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const data = JSON.parse(ev.target.result);
      if(data.progress || data.resources || data.activity){
        progress = data.progress || {};
        resources = data.resources || {};
        activity = data.activity || {};
      } else {
        progress = data;
      }
      saveProgress(); saveResources(); saveActivity();
      updateStreakPill();
      renderGrid();
      showToast("تم استيراد التقدم بنجاح");
    }catch(err){
      showToast("خطأ: الملف غير صالح");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});
async function resetAll(){
  const ok = await customConfirm("تصفير كل التقدم", "هل أنت متأكد من تصفير كل التقدم؟ لا يمكن التراجع عن هذا الإجراء.");
  if(ok){
    progress = {};
    saveProgress();
    renderGrid();
    showToast("تم تصفير كل التقدم");
  }
}

/* ================= THEME / ACCENT / PERFORMANCE ================= */
const PERF_KEY = "emle_perf_mode";
function toggleTheme(){
  const current = document.body.getAttribute("data-theme");
  const next = current==="dark" ? "light" : "dark";
  document.body.setAttribute("data-theme", next);
  localStorage.setItem(THEME_KEY, next);
}
function applyAccent(id){
  if(id==="default") document.body.removeAttribute("data-accent");
  else document.body.setAttribute("data-accent", id);
  localStorage.setItem(ACCENT_KEY, id);
}
function setPerfMode(on){
  if(on) document.body.setAttribute("data-perf", "lite");
  else document.body.removeAttribute("data-perf");
  localStorage.setItem(PERF_KEY, on ? "1" : "0");
}
document.body.setAttribute("data-theme", localStorage.getItem(THEME_KEY) || "dark");
applyAccent(localStorage.getItem(ACCENT_KEY) || "default");
setPerfMode(localStorage.getItem(PERF_KEY) === "1");
setVisualTheme(getVisualTheme());

/* ================= INIT ================= */
renderGrid();
updateOverallProgress();
updateStreakPill();
renderGarden();
</script>
