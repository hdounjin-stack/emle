<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1020">
<title>EMLE Study Tracker</title>
<style>
  :root{
    --bg1:#0b1020; --bg2:#161033; --bg3:#0e2136;
    --blob1:#4f7cff; --blob2:#7c4fff; --blob3:#22d3c9;
    --text:#eef1fb; --muted:#9aa4c0;
    --glass:rgba(255,255,255,.07); --glass-strong:rgba(255,255,255,.12);
    --glass-border:rgba(255,255,255,.16);
    --glass-inner:#141a30;
    --primary:#5eead4; --primary2:#7c9bff;
    --accent:#ffb648;
    --shadow:0 8px 32px rgba(0,0,0,.45);
    --radius:22px;
  }
  [data-theme="light"]{
    --bg1:#eef2fb; --bg2:#e3ecff; --bg3:#f3eaff;
    --blob1:#a9c4ff; --blob2:#d5b8ff; --blob3:#9df0e6;
    --text:#1b2340; --muted:#63698a;
    --glass:rgba(255,255,255,.55); --glass-strong:rgba(255,255,255,.7);
    --glass-border:rgba(255,255,255,.9);
    --glass-inner:#f3f6ff;
    --primary:#12a893; --primary2:#4c6fe0;
    --accent:#e08a1e;
    --shadow:0 8px 32px rgba(90,110,160,.18);
  }
  /* ---- optional accent color presets (layout stays identical) ---- */
  [data-accent="sunset"]{ --primary:#ff9457; --primary2:#ff6188; --accent:#ffd166; }
  [data-accent="rose"]{ --primary:#ff7bac; --primary2:#c084fc; --accent:#ff9de2; }
  [data-accent="violet"]{ --primary:#a78bfa; --primary2:#6d5bff; --accent:#f0abfc; }
  [data-accent="emerald"]{ --primary:#34d399; --primary2:#22a5b8; --accent:#a3e635; }
  [data-accent="ocean"]{ --primary:#38bdf8; --primary2:#6366f1; --accent:#5eead4; }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Segoe UI","Tahoma",Arial,sans-serif;
    color:var(--text);
    background:var(--bg1);
    overflow-x:hidden;
    min-height:100vh;
    transition:background .4s,color .4s;
  }
  .bg-blobs{position:fixed;inset:0;z-index:-1;overflow:hidden;background:
      radial-gradient(circle at 20% 15%, var(--bg2), transparent 60%),
      radial-gradient(circle at 80% 85%, var(--bg3), transparent 60%),
      var(--bg1);
      contain:strict;}
  .blob{position:absolute;border-radius:50%;filter:blur(46px);opacity:.5;will-change:transform;}
  .blob1{width:420px;height:420px;background:var(--blob1);top:-120px;right:-100px;animation:float1 22s ease-in-out infinite;}
  .blob2{width:380px;height:380px;background:var(--blob2);bottom:-140px;left:-120px;animation:float2 26s ease-in-out infinite;}
  .blob3{width:320px;height:320px;background:var(--blob3);top:40%;left:35%;animation:float3 30s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translate3d(0,0,0) scale(1);}50%{transform:translate3d(-60px,60px,0) scale(1.12);}}
  @keyframes float2{0%,100%{transform:translate3d(0,0,0) scale(1);}50%{transform:translate3d(70px,-50px,0) scale(1.08);}}
  @keyframes float3{0%,100%{transform:translate3d(0,0,0) scale(1);}50%{transform:translate3d(-40px,-40px,0) scale(1.15);}}
  @media (prefers-reduced-motion: reduce){
    .blob{animation:none !important;}
    .fill::after{animation:none !important;}
  }
  /* Low-power fallback: on devices too weak for backdrop-filter, blobs are
     hidden automatically and the flat background color takes over cleanly. */
  @media (max-width:480px) and (max-height:480px){ .blob{display:none;} }

  /* ===== Lightweight Mode (manual opt-in for weak/slow devices) ===== */
  [data-perf="lite"] .blob{display:none;}
  [data-perf="lite"] .glass{
    backdrop-filter:none !important;-webkit-backdrop-filter:none !important;
    background:var(--glass-strong);box-shadow:none;
  }
  [data-perf="lite"] *{
    animation:none !important;
    transition:none !important;
  }
  [data-perf="lite"] .tile:hover, [data-perf="lite"] .topic-chip:hover{transform:none;}
  [data-perf="lite"] .fill::after{display:none;}
  [data-perf="lite"] .tile::before{display:none;}

  .glass{
    background:var(--glass);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    border:1px solid var(--glass-border);
    box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.15);
    border-radius:var(--radius);
  }

  .pinned-header{position:sticky;top:0;z-index:60;padding-top:12px;background:var(--bg1);}
  .topbar{
    margin:0 12px;
    padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .mark{
    width:38px;height:38px;border-radius:12px;flex-shrink:0;
    background:linear-gradient(135deg,var(--primary),var(--primary2));
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#08101c;font-size:15px;
    box-shadow:0 4px 14px rgba(94,234,212,.35);
  }
  .brand h1{margin:0;font-size:17px;font-weight:800;}
  .brand small{display:block;color:var(--muted);font-size:11px;font-weight:500;}
  .dock{display:flex;align-items:center;gap:6px;}
  .dock button{
    height:38px;padding:0 12px;border-radius:12px;border:1px solid var(--glass-border);
    background:var(--glass-strong);color:var(--text);cursor:pointer;font-size:15px;
    display:flex;align-items:center;justify-content:center;gap:5px;transition:transform .2s, background .2s;
    white-space:nowrap;
  }
  .dock button .lbl{font-size:11.5px;font-weight:700;display:none;}
  .dock button:hover{transform:translateY(-2px);background:rgba(255,255,255,.2);}
  .dock button:active{transform:scale(.94);}
  @media(min-width:700px){ .dock button .lbl{display:inline;} }
  .pomodoro-badge{
    display:none;position:absolute;top:-3px;left:-3px;width:14px;height:14px;border-radius:50%;
    background:conic-gradient(var(--primary) calc(var(--p,0)*3.6deg), rgba(255,255,255,.25) 0deg);
    border:1.5px solid var(--bg1);pointer-events:none;
  }
  .pomodoro-badge.active{display:block;}

  .overall-wrap{margin:14px 12px 0;padding:16px 20px;}
  .overall-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
  .overall-top h2{margin:0;font-size:14px;font-weight:700;color:var(--muted);}
  .overall-num{font-size:26px;font-weight:800;background:linear-gradient(90deg,var(--primary),var(--primary2));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .track{height:12px;border-radius:20px;background:rgba(255,255,255,.12);overflow:hidden;position:relative;}
  .fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--primary),var(--primary2));
    transition:width .5s cubic-bezier(.4,0,.2,1);position:relative;}
  .fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
    width:60px;animation:shine 2.6s linear infinite;}
  @keyframes shine{0%{transform:translateX(-60px);}100%{transform:translateX(320px);}}
  .mini-stats{display:flex;gap:16px;margin-top:10px;font-size:12px;color:var(--muted);flex-wrap:wrap;}
  .mini-stats b{color:var(--text);}
  .streak-pill{
    display:inline-flex;align-items:center;gap:5px;background:rgba(255,182,72,.15);
    border:1px solid rgba(255,182,72,.35);color:var(--accent);
    padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:800;
  }

  .search-wrap{margin:14px 12px 0;padding:4px 16px;display:flex;align-items:center;gap:10px;}
  .search-wrap input{
    flex:1;background:transparent;border:none;outline:none;color:var(--text);
    font-size:15px;padding:10px 4px;font-family:inherit;
  }
  .search-wrap input::placeholder{color:var(--muted);}

  main{max-width:1100px;margin:0 auto;padding:16px 12px 60px;}
  .sections-header{display:flex;align-items:center;justify-content:space-between;margin:4px 4px 12px;}
  .sections-header h2{margin:0;font-size:15px;font-weight:800;letter-spacing:.3px;color:var(--text);}
  .garden-wrap{margin-top:20px;padding:16px 18px;}
  .garden-head{display:flex;justify-content:space-between;align-items:center;font-size:13.5px;font-weight:800;margin-bottom:10px;}
  .garden-count{font-size:11.5px;color:var(--muted);font-weight:600;}
  .garden-plants{display:flex;flex-wrap:wrap;gap:6px;min-height:34px;align-items:flex-end;}
  .garden-plant{font-size:22px;animation:plantPop .35s ease;}
  @keyframes plantPop{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
  .garden-empty{font-size:12px;color:var(--muted);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;margin-top:6px;}
  .tile{
    position:relative;padding:18px 16px;cursor:pointer;overflow:hidden;
    display:flex;flex-direction:column;justify-content:space-between;min-height:170px;
    transition:transform .25s cubic-bezier(.2,.8,.3,1.2), box-shadow .25s;contain:content;
  }
  .tile::before{
    content:'';position:absolute;inset:0;border-radius:var(--radius);
    background:linear-gradient(135deg, var(--tc,var(--primary)) 0%, transparent 55%);
    opacity:.16;pointer-events:none;
  }
  .tile:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 16px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.2);}
  .tile:active{transform:translateY(-2px) scale(.99);}
  .tile-top{display:flex;justify-content:space-between;align-items:center;}
  .tile-icon{
    width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;
    font-size:20px;background:rgba(255,255,255,.12);border:1px solid var(--glass-border);flex-shrink:0;
  }
  .ring{
    --p:0; width:44px;height:44px;border-radius:50%;position:relative;flex-shrink:0;
    background:conic-gradient(var(--tc,var(--primary)) calc(var(--p)*3.6deg), rgba(255,255,255,.15) 0deg);
    display:flex;align-items:center;justify-content:center;
  }
  .ring::after{content:'';position:absolute;inset:4px;border-radius:50%;background:var(--glass-inner);}
  .ring span{position:relative;z-index:1;font-size:10px;font-weight:800;}
  .tile-title-row{display:flex;align-items:center;gap:8px;margin-top:14px;}
  .tile-title{font-size:16px;font-weight:800;line-height:1.3;flex:1;min-width:0;}
  .tile-sub{font-size:12px;color:var(--muted);margin-top:4px;}
  .tile-bar{height:6px;border-radius:10px;background:rgba(255,255,255,.15);margin-top:12px;overflow:hidden;}
  .tile-bar-fill{height:100%;border-radius:10px;background:var(--tc,var(--primary));transition:width .5s;}

  .overlay{
    position:fixed;inset:0;z-index:200;display:none;
    background:rgba(4,6,16,.55);backdrop-filter:blur(6px);
    align-items:flex-end;justify-content:center;
  }
  .overlay.open{display:flex;animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @media(min-width:760px){ .overlay{align-items:center;} }
  .modal{
    width:100%;max-width:760px;max-height:88vh;
    border-radius:26px 26px 0 0;
    display:flex;flex-direction:column;overflow:hidden;
    animation:slideUp .3s cubic-bezier(.2,.8,.3,1);
  }
  @media(min-width:760px){ .modal{border-radius:26px;max-height:82vh;} }
  @keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-head{
    padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;
    border-bottom:1px solid var(--glass-border);flex-shrink:0;
  }
  .modal-head-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1;}
  .modal-head-left .tile-icon{width:40px;height:40px;font-size:18px;}
  .modal-title{font-size:23px;font-weight:900;letter-spacing:.2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .modal-sub{font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:600;}
  .close-btn{
    width:36px;height:36px;border-radius:11px;border:1px solid var(--glass-border);
    background:var(--glass-strong);color:var(--text);cursor:pointer;font-size:16px;flex-shrink:0;
  }
  .back-btn{font-size:19px;font-weight:800;}
  .modal-toolbar{display:flex;gap:8px;padding:12px 20px;flex-wrap:wrap;border-bottom:1px solid var(--glass-border);flex-shrink:0;}
  .modal-body{overflow-y:auto;padding:10px 20px 24px;flex:1;}
  .mini-btn{
    background:var(--glass-strong);border:1px solid var(--glass-border);color:var(--text);
    padding:8px 14px;border-radius:10px;font-size:12.5px;cursor:pointer;
  }
  .mini-btn:hover{background:rgba(255,255,255,.22);}
  .mini-btn.active{background:var(--primary);color:#08101c;font-weight:800;border-color:var(--primary);}

  .theme-name{
    font-size:17px;font-weight:800;color:var(--text);letter-spacing:.2px;
    margin:20px 0 10px;padding-inline-start:10px;border-inline-start:4px solid var(--accent);
    flex:1;min-width:0;
  }
  .theme-head{
    display:flex;align-items:center;gap:10px;margin:22px 0 10px;flex-wrap:wrap;
    cursor:pointer;user-select:none;padding:6px 8px;margin-inline-start:-8px;border-radius:12px;
    transition:background .2s;
  }
  .theme-head:hover{background:rgba(255,255,255,.05);}
  .theme-chevron{
    color:var(--muted);font-size:13px;flex-shrink:0;transition:transform .25s;
    width:18px;text-align:center;
  }
  .theme-head.expanded .theme-chevron{transform:rotate(180deg);color:var(--text);}
  .theme-chevron.expanded{transform:rotate(180deg);color:var(--text);}
  .theme-topics{display:none;}
  .theme-topics.open{display:block;animation:themeOpen .25s ease;}
  @keyframes themeOpen{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
  .theme-block{content-visibility:auto;contain-intrinsic-size:1px 60px;}
  .theme-mini-bar{
    flex:1;min-width:60px;max-width:110px;height:6px;border-radius:10px;
    background:rgba(255,255,255,.13);overflow:hidden;
  }
  .theme-mini-fill{height:100%;border-radius:10px;background:var(--dc,var(--primary));transition:width .4s;}
  .theme-mini-badge{
    font-size:11px;font-weight:800;color:var(--muted);background:rgba(255,255,255,.08);
    padding:3px 9px;border-radius:20px;flex-shrink:0;
  }
  .theme-dash-mini{
    width:28px;height:28px;border-radius:9px;border:1px solid var(--glass-border);
    background:rgba(255,255,255,.08);color:var(--text);font-size:13px;cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;transition:transform .2s, background .2s;
  }
  .theme-dash-mini:hover{transform:scale(1.1);background:var(--dc,var(--primary));color:#08101c;}
  .topic-wrap{border-radius:14px;margin-bottom:4px;}
  .topic-row{
    display:flex;align-items:center;gap:10px;padding:11px 10px;border-radius:14px;
    transition:background .2s;contain:content;
  }
  .topic-row:hover{background:rgba(255,255,255,.06);}
  .topic-row.done{background:rgba(94,234,212,.12);}
  .topic-row.highlight-flash{animation:jumpFlash 1.8s ease;}
  @keyframes jumpFlash{
    0%{background:var(--primary);}
    100%{background:transparent;}
  }
  .topic-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--primary);cursor:pointer;flex-shrink:0;}
  .topic-row label{flex:1;font-size:14.5px;cursor:pointer;line-height:1.4;}
  .topic-row.done label{text-decoration:line-through;color:var(--muted);}
  .topic-row .ctx{font-size:11px;color:var(--muted);display:block;margin-top:1px;}
  .res-toggle{
    background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;
    padding:6px 8px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;gap:4px;
  }
  .res-toggle:hover{background:rgba(255,255,255,.1);color:var(--primary);}
  .res-toggle .count{background:var(--primary);color:#08101c;border-radius:10px;font-size:10px;padding:1px 6px;min-width:16px;text-align:center;font-weight:800;}
  .res-panel{
    display:none;margin:4px 8px 12px 30px;padding:12px;border-radius:14px;
    background:rgba(255,255,255,.05);border:1px dashed var(--glass-border);
  }
  .res-panel.open{display:block;}
  .res-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
  .res-item{
    display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);
    border:1px solid var(--glass-border);border-radius:10px;padding:7px 10px;font-size:13px;contain:content;
  }
  .res-item .res-icon{flex-shrink:0;font-size:20px;width:26px;text-align:center;display:inline-block;}
  .res-item .res-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .res-item a{color:var(--primary);text-decoration:none;}
  .res-item .res-del{background:none;border:none;color:#ff6b6b;cursor:pointer;font-size:14px;flex-shrink:0;}
  .res-empty{font-size:12.5px;color:var(--muted);margin-bottom:10px;}
  .res-add-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .res-tab{
    background:rgba(255,255,255,.06);border:1px solid var(--glass-border);color:var(--text);
    padding:6px 10px;border-radius:9px;font-size:12px;cursor:pointer;
  }
  .res-tab.active{background:var(--primary);color:#08101c;border-color:var(--primary);font-weight:700;}
  .res-form{display:none;gap:6px;}
  .res-form.active{display:flex;flex-wrap:wrap;}
  .res-form input[type=text],.res-form input[type=url],.res-form textarea{
    flex:1;min-width:150px;padding:9px 10px;border-radius:10px;border:1px solid var(--glass-border);
    background:rgba(255,255,255,.08);color:var(--text);font-size:13px;font-family:inherit;
  }
  .res-form textarea{width:100%;min-height:50px;resize:vertical;}
  .res-form button{
    background:var(--primary);color:#08101c;border:none;padding:9px 16px;
    border-radius:10px;font-size:13px;cursor:pointer;font-weight:700;
  }
  .res-form input[type=file]{display:block;font-size:12px;color:var(--text);}

  .empty-state{text-align:center;padding:40px 10px;color:var(--muted);font-size:14px;}

  footer{text-align:center;color:var(--muted);font-size:11.5px;padding:26px 16px 10px;}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    padding:11px 22px;font-size:13px;z-index:400;
    opacity:0;pointer-events:none;transition:opacity .3s, bottom .3s;
  }
  .toast.show{opacity:1;bottom:34px;}
  input[type=file]{display:none;}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:10px;}

  /* ===== stats / heatmap ===== */
  .stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:18px;}
  .stat-card{padding:14px;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid var(--glass-border);text-align:center;}
  .stat-card .num{font-size:24px;font-weight:900;background:linear-gradient(90deg,var(--primary),var(--primary2));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .stat-card .lbl{font-size:12px;color:var(--muted);margin-top:4px;font-weight:600;}
  .heatmap-wrap{overflow-x:auto;padding-bottom:6px;}
  .heatmap{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,13px);gap:3px;width:max-content;}
  .hcell{width:13px;height:13px;border-radius:4px;background:rgba(255,255,255,.09);}
  .hcell[data-lvl="1"]{background:color-mix(in srgb, var(--primary) 30%, transparent);}
  .hcell[data-lvl="2"]{background:color-mix(in srgb, var(--primary) 55%, transparent);}
  .hcell[data-lvl="3"]{background:color-mix(in srgb, var(--primary) 78%, transparent);}
  .hcell[data-lvl="4"]{background:var(--primary);}
  .heatmap-legend{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;color:var(--muted);}
  .heatmap-legend .hcell{width:11px;height:11px;}

  /* ===== settings ===== */
  .settings-block{margin-bottom:22px;}
  .settings-block h3{font-size:13px;margin:0 0 10px;color:var(--muted);font-weight:800;}
  .fs-row{display:flex;align-items:center;gap:10px;}
  .fs-row button{
    width:40px;height:40px;border-radius:12px;border:1px solid var(--glass-border);
    background:rgba(255,255,255,.08);color:var(--text);font-size:16px;cursor:pointer;font-weight:800;
  }
  .fs-row .fs-val{flex:1;text-align:center;font-weight:800;font-size:14px;}
  .swatches{display:flex;gap:10px;flex-wrap:wrap;}
  .swatch{
    width:44px;height:44px;border-radius:14px;cursor:pointer;border:2px solid transparent;
    display:flex;align-items:center;justify-content:center;font-size:16px;
    transition:transform .2s;
  }
  .swatch:hover{transform:scale(1.08);}
  .swatch.active{border-color:var(--text);}
  .settings-row{display:flex;gap:8px;flex-wrap:wrap;}

  /* ===== files view ===== */
  .file-group{margin-bottom:16px;}
  .file-group h4{font-size:13px;margin:0 0 8px;display:flex;align-items:center;gap:8px;}

  /* ===== content manager ===== */
  .cm-section{margin-bottom:14px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid var(--glass-border);overflow:hidden;}
  .cm-section-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
  .cm-section-head.hidden-item{opacity:.45;}
  .cm-section-head .cm-badge{font-size:10px;background:rgba(255,255,255,.1);color:var(--muted);padding:2px 8px;border-radius:10px;flex-shrink:0;}
  .cm-section-body{display:none;padding:0 14px 14px;}
  .cm-section-body.open{display:block;}
  .cm-theme-row{
    display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;margin-bottom:6px;
    background:rgba(255,255,255,.04);border:1px solid var(--glass-border);
  }
  .cm-theme-row.hidden-item{opacity:.45;}
  .cm-theme-row .cm-name{flex:1;min-width:0;font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cm-topic-row{
    display:flex;align-items:center;gap:8px;padding:6px 10px 6px 26px;font-size:12.5px;
  }
  .cm-topic-row.hidden-item{opacity:.45;}
  .cm-topic-row .cm-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cm-icon-btn{
    width:26px;height:26px;border-radius:8px;border:1px solid var(--glass-border);background:rgba(255,255,255,.06);
    color:var(--text);font-size:12px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  }
  .cm-icon-btn:hover{background:rgba(255,255,255,.15);}
  .cm-add-form{
    display:flex;flex-direction:column;gap:10px;padding:14px;border-radius:16px;
    background:rgba(255,255,255,.05);border:1px dashed var(--glass-border);margin-bottom:14px;
  }
  .cm-add-form input[type=text]{
    padding:10px 12px;border-radius:10px;border:1px solid var(--glass-border);
    background:rgba(255,255,255,.08);color:var(--text);font-size:13px;font-family:inherit;
  }
  .cm-icon-swatches{display:flex;gap:8px;flex-wrap:wrap;}
  .cm-color-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
  .cm-color-dot.active{border-color:var(--text);}

  .tile-dash-btn{
    width:28px;height:28px;border-radius:9px;border:1px solid var(--glass-border);
    background:rgba(0,0,0,.28);color:#fff;font-size:13px;cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;opacity:.85;
    transition:transform .2s, background .2s, opacity .2s;
  }
  .tile-dash-btn:hover{opacity:1;transform:scale(1.1);background:rgba(0,0,0,.45);}

  /* ===== Pro Dashboard ===== */
  .dash-hero{
    position:relative;border-radius:20px;padding:24px 22px;margin-bottom:18px;overflow:hidden;
    background:linear-gradient(135deg, var(--dc,var(--primary)) 0%, rgba(0,0,0,.15) 100%);
    color:#fff;box-shadow:0 12px 30px rgba(0,0,0,.3);
  }
  .dash-hero::after{
    content:'';position:absolute;inset:0;
    background:radial-gradient(circle at 85% 15%, rgba(255,255,255,.25), transparent 55%);
    pointer-events:none;
  }
  .dash-hero-top{display:flex;align-items:center;gap:16px;position:relative;z-index:1;}
  .dash-hero-icon{
    width:56px;height:56px;border-radius:16px;background:rgba(255,255,255,.22);
    display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;
    border:1px solid rgba(255,255,255,.35);
  }
  .dash-hero-title{font-size:20px;font-weight:900;}
  .dash-hero-sub{font-size:12.5px;opacity:.9;margin-top:2px;}
  .dash-ring-big{
    --p:0; width:96px;height:96px;border-radius:50%;flex-shrink:0;margin-inline-start:auto;
    background:conic-gradient(#fff calc(var(--p)*3.6deg), rgba(255,255,255,.28) 0deg);
    display:flex;align-items:center;justify-content:center;position:relative;
  }
  .dash-ring-big::after{content:'';position:absolute;inset:8px;border-radius:50%;background:rgba(0,0,0,.28);}
  .dash-ring-big span{position:relative;z-index:1;font-size:20px;font-weight:900;}
  .dash-quick{display:flex;gap:10px;margin-top:18px;position:relative;z-index:1;flex-wrap:wrap;}
  .dash-quick-card{
    flex:1;min-width:90px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);
    border-radius:14px;padding:10px 12px;text-align:center;
  }
  .dash-quick-card .n{font-size:19px;font-weight:900;}
  .dash-quick-card .l{font-size:10.5px;opacity:.9;margin-top:2px;}

  .dash-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px;}
  .dash-stat{
    background:rgba(255,255,255,.06);border:1px solid var(--glass-border);border-radius:14px;
    padding:12px 14px;
  }
  .dash-stat .n{font-size:18px;font-weight:800;}
  .dash-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}

  .dash-section-title{font-size:14.5px;font-weight:800;margin:6px 0 12px;display:flex;align-items:center;gap:8px;}

  .theme-table{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
  .theme-row{
    display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;
    background:rgba(255,255,255,.05);border:1px solid var(--glass-border);contain:content;
  }
  .theme-row .tname{flex:1;min-width:0;font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .theme-row .tbar{flex:1;height:7px;border-radius:10px;background:rgba(255,255,255,.13);overflow:hidden;max-width:130px;}
  .theme-row .tbar-fill{height:100%;border-radius:10px;background:var(--dc,var(--primary));}
  .theme-row .tcount{font-size:11.5px;color:var(--muted);width:44px;text-align:left;flex-shrink:0;}
  .theme-row:hover{background:rgba(255,255,255,.09);}

  .recent-table{display:flex;flex-direction:column;gap:6px;}
  .recent-row{
    display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:12px;
    background:rgba(255,255,255,.05);border:1px solid var(--glass-border);font-size:13px;contain:content;
  }
  .recent-row .rtitle{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .recent-row .rtheme{font-size:11px;color:var(--muted);}
  .recent-row .rdate{font-size:11px;color:var(--muted);flex-shrink:0;background:rgba(255,255,255,.08);padding:3px 9px;border-radius:20px;}

  /* ===== theme dashboard: topic chip grid ===== */
  .chip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:22px;}
  .topic-chip{
    position:relative;padding:12px 12px 12px 14px;border-radius:16px;cursor:pointer;
    background:rgba(255,255,255,.06);border:1px solid var(--glass-border);
    transition:transform .18s, background .18s, border-color .18s;
    display:flex;flex-direction:column;gap:8px;min-height:76px;contain:content;
  }
  .topic-chip:hover{transform:translateY(-3px);background:rgba(255,255,255,.1);}
  .topic-chip:active{transform:scale(.97);}
  .topic-chip.done{
    background:color-mix(in srgb, var(--dc,var(--primary)) 18%, transparent);
    border-color:color-mix(in srgb, var(--dc,var(--primary)) 45%, transparent);
  }
  .topic-chip .chip-top{display:flex;align-items:center;justify-content:space-between;}
  .topic-chip .chip-status{
    width:22px;height:22px;border-radius:50%;border:2px solid var(--muted);
    display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;color:transparent;
  }
  .topic-chip.done .chip-status{
    background:var(--dc,var(--primary));border-color:var(--dc,var(--primary));color:#08101c;
  }
  .topic-chip .chip-res{font-size:10.5px;color:var(--muted);background:rgba(255,255,255,.1);padding:2px 7px;border-radius:10px;}
  .chip-res-btn{
    background:rgba(255,255,255,.1);border:1px solid var(--glass-border);color:var(--muted);
    font-size:12px;padding:3px 8px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:3px;
    transition:background .2s, color .2s;
  }
  .chip-res-btn:hover{background:var(--primary);color:#08101c;}
  .chip-res-btn .count{
    background:var(--primary);color:#08101c;border-radius:8px;font-size:9.5px;padding:0 5px;font-weight:800;
  }
  .chip-res-btn:hover .count{background:#08101c;color:var(--primary);}
  .topic-chip .chip-label{font-size:12.5px;font-weight:700;line-height:1.35;flex:1;}
  .topic-chip.done .chip-label{color:var(--muted);text-decoration:line-through;}

  @media(max-width:600px){
    .brand h1{font-size:15px;}
    .overall-num{font-size:22px;}
    .grid{grid-template-columns:repeat(2,1fr);}
  }
/* ======================================================================
   VISUAL THEMES (تخصيص المظهر) — pure CSS skins, gated behind body classes.
   No HTML/JS structure is altered; only appearance changes per theme.
   ====================================================================== */

function loadContent(){
  const raw = JSON.parse(localStorage.getItem(CONTENT_KEY) || "{}");
  return {
    customSections: raw.customSections || [],
    addedThemes: raw.addedThemes || {},   // { sectionId: [{name, topics:[...]}, ...] }
    addedTopics: raw.addedTopics || {},   // { "sectionId__ti": ["topic text", ...] }
    renamedThemes: raw.renamedThemes || {}, // { "sectionId__ti": "new name" }
    renamedTopics: raw.renamedTopics || {}, // { "sectionId__ti__pi": "new text" }
    hiddenThemes: raw.hiddenThemes || {},   // { "sectionId__ti": true }
    hiddenTopics: raw.hiddenTopics || {},   // { "sectionId__ti__pi": true }
    hiddenSections: raw.hiddenSections || {} // { sectionId: true }
  };
}

function saveContent(){ localStorage.setItem(CONTENT_KEY, JSON.stringify(content)); }

function isThemeHidden(sid, ti){ return !!content.hiddenThemes[sid+"__"+ti]; }
function isTopicHidden(sid, ti, pi){ return !!content.hiddenTopics[sid+"__"+ti+"__"+pi]; }
function isSectionHidden(sid){ return !!content.hiddenSections[sid]; }

let DATA = [];
let DATA_ALL = []; // includes hidden sections too, used by the Content Manager
function rebuildData(){
  const clone = JSON.parse(JSON.stringify(BUILTIN_DATA));
  const all = clone.concat(JSON.parse(JSON.stringify(content.customSections)));
  all.forEach(section=>{
    // append extra themes
    const extraThemes = content.addedThemes[section.id] || [];
    extraThemes.forEach(t=> section.themes.push({name:t.name, topics:(t.topics||[]).slice()}));
    // rename themes + append extra topics + rename topics
    section.themes.forEach((theme, ti)=>{
      const themeKey = section.id+"__"+ti;
      if(content.renamedThemes[themeKey]) theme.name = content.renamedThemes[themeKey];
      const extraTopics = content.addedTopics[themeKey] || [];
      extraTopics.forEach(tp=> theme.topics.push(tp));
      theme.topics.forEach((tp, pi)=>{
        const topicKeyStr = section.id+"__"+ti+"__"+pi;
        if(content.renamedTopics[topicKeyStr]) theme.topics[pi] = content.renamedTopics[topicKeyStr];
      });
    });
  });
  DATA_ALL = all;
  DATA = all.filter(s=> !isSectionHidden(s.id));
}
rebuildData();

function addTopicToTheme(sectionId, ti, text){

  content.addedTopics[k].push(text);
  saveContent(); rebuildData();
}

}
function renameTopic(sectionId, ti, pi, newText){

function logActivity(){
  const t = todayStr();
  activity[t] = (activity[t]||0) + 1;
  saveActivity();
  updateStreakPill();
  refreshLiveViews();
}
function unlogActivity(ts){
  if(typeof ts !== "number") return;
  const t = todayStr(new Date(ts));
  if(activity[t]){
    activity[t]--;
    if(activity[t]<=0) delete activity[t];
    saveActivity();
    updateStreakPill();
  }
  refreshLiveViews();
}

/* ---- IndexedDB for file attachments (with safe fallback) ---- */
let dbPromise = new Promise((resolve,reject)=>{
  try{
    if(!window.indexedDB){ reject(new Error("IndexedDB غير مدعوم")); return; }
    const req = indexedDB.open("emle_files_db", 1);
    req.onupgradeneeded = (e)=>{ e.target.result.createObjectStore("files"); };
    req.onsuccess = (e)=> resolve(e.target.result);
    req.onerror = (e)=> reject(e.target ? e.target.error : e);
    req.onblocked = ()=> reject(new Error("قاعدة البيانات محجوبة"));
  }catch(err){ reject(err); }
});
async function saveFileBlob(id, blob){
  const db = await dbPromise;
  return new Promise((resolve,reject)=>{
    const tx = db.transaction("files","readwrite");
    tx.objectStore("files").put(blob, id);
    tx.oncomplete = ()=>resolve();
    tx.onerror = (e)=>reject(e);
  });
}
async function getFileBlob(id){
  const db = await dbPromise;
  return new Promise((resolve,reject)=>{
    const tx = db.transaction("files","readonly");
    const req = tx.objectStore("files").get(id);
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = (e)=>reject(e);
  });
}
async function deleteFileBlob(id){
  const db = await dbPromise;
  return new Promise((resolve,reject)=>{
    const tx = db.transaction("files","readwrite");
    tx.objectStore("files").delete(id);
    tx.oncomplete = ()=>resolve();
    tx.onerror = (e)=>reject(e);
  });
}
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

/* Try IndexedDB first; if it fails for any reason, fall back to storing the
   file inline as base64 (works everywhere, capped to keep localStorage sane). */
async function storeFile(file){
  const id = genId();
  try{
    await saveFileBlob(id, file);
    return {id, inline:false};
  }catch(err){
    if(file.size > 40*1024*1024){
      throw new Error("الملف كبير جداً (الحد الأقصى 40MB)");
    }
    const dataUrl = await new Promise((resolve,reject)=>{
      const r = new FileReader();
      r.onload = ()=>resolve(r.result);
      r.onerror = ()=>reject(new Error("تعذرت قراءة الملف"));
      r.readAsDataURL(file);
    });
    return {id, inline:true, dataUrl};
  }
}
async function openFileItem(item){
  if(item.dataUrl){
    window.open(item.dataUrl, "_blank");
    return;
  }
  try{
    const blob = await getFileBlob(item.id);
    if(!blob){ showToast("الملف غير موجود"); return; }
    const url = URL.createObjectURL(blob);
    window.open(url, "_blank");
    setTimeout(()=>URL.revokeObjectURL(url), 60000);
  }catch(err){
    showToast("تعذر فتح الملف");
  }
}

/* ================= COUNTING ================= */
function countTotals(section){
  let total=0, done=0;
  section.themes.forEach((th, ti)=>{
    if(isThemeHidden(section.id, ti)) return;
    th.topics.forEach((tp, pi)=>{
      if(isTopicHidden(section.id, ti, pi)) return;
      total++;
      if(progress[topicKey(section.id, ti, pi)]) done++;
    });
  });
  return {total, done};
}

/* ---- Extra analytics used by the Pro Dashboard ---- */
function sectionResourceCount(section){
  let n = 0;
  section.themes.forEach((th, ti)=>{
    if(isThemeHidden(section.id, ti)) return;
    th.topics.forEach((tp, pi)=>{
      if(isTopicHidden(section.id, ti, pi)) return;
      n += (resources[topicKey(section.id, ti, pi)] || []).length;
    });
  });
  return n;
}
function sectionLastStudied(section){
  let last = 0;
  section.themes.forEach((th, ti)=>{
    if(isThemeHidden(section.id, ti)) return;
    th.topics.forEach((tp, pi)=>{
      if(isTopicHidden(section.id, ti, pi)) return;
      const v = progress[topicKey(section.id, ti, pi)];
      if(typeof v === "number" && v > last) last = v;
    });
  });
  return last;
}
function sectionRecentCompletions(section, limit=6){
  const rows = [];
  section.themes.forEach((th, ti)=>{
    if(isThemeHidden(section.id, ti)) return;
    th.topics.forEach((tp, pi)=>{
      if(isTopicHidden(section.id, ti, pi)) return;
      const v = progress[topicKey(section.id, ti, pi)];
      if(typeof v === "number") rows.push({tp, themeName:th.name, ts:v});
    });
  });
  rows.sort((a,b)=> b.ts - a.ts);
  return rows.slice(0, limit);
}
function formatRelativeDate(ts){
  if(!ts) return "—";
  const diffMs = Date.now() - ts;
  const days = Math.floor(diffMs / 86400000);
  if(days<=0) return "اليوم";
  if(days===1) return "أمس";
  if(days<7) return `منذ ${days} أيام`;
  const d = new Date(ts);
  return d.toLocaleDateString("ar-EG", {day:"numeric", month:"short"});
}
function themeStats(section, ti){
  const theme = section.themes[ti];
  let done=0, resCount=0, lastTs=0;
  const topics = theme.topics
    .map((tp,pi)=>({tp,pi}))
    .filter(o=> !isTopicHidden(section.id, ti, o.pi))
    .map(({tp,pi})=>{
      const key = topicKey(section.id, ti, pi);
      const v = progress[key];
      const isDone = !!v;
      if(isDone) done++;
      if(typeof v === "number" && v > lastTs) lastTs = v;
      const rc = (resources[key]||[]).length;
      resCount += rc;
      return {tp, pi, key, isDone, resCount:rc};
    });
  return {theme, topics, total: topics.length, done, resCount, lastTs};
}

function updateOverallProgress(){
  let total=0, done=0;
  DATA.forEach(section=>{
    const c = countTotals(section);
    total += c.total; done += c.done;
  });
  const percent = total? Math.round((done/total)*100) : 0;
  document.getElementById("overallFill").style.width = percent+"%";
  document.getElementById("overallText").textContent = percent+"%";
  document.getElementById("doneCount").textContent = done;
  document.getElementById("totalCount").textContent = total;
  document.getElementById("remainingCount").textContent = total-done;
  renderGrid();
}

/* ================= STREAK / STATS ================= */
function computeStreak(){
  let streak = 0;
  let d = new Date();
  // if today has no activity yet, start counting from yesterday
  if(!activity[todayStr(d)]) d.setDate(d.getDate()-1);
  while(activity[todayStr(d)]){
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function sumLastNDays(n){
  let sum = 0;
  const d = new Date();
  for(let i=0;i<n;i++){
    sum += activity[todayStr(d)] || 0;
    d.setDate(d.getDate()-1);
  }
  return sum;
}
function sumThisMonth(){
  const now = new Date();
  let sum = 0;
  Object.keys(activity).forEach(dateStr=>{
    const dt = new Date(dateStr);
    if(dt.getFullYear()===now.getFullYear() && dt.getMonth()===now.getMonth()) sum += activity[dateStr];
  });
  return sum;
}
function updateStreakPill(){
  const s = computeStreak();
  document.getElementById("streakPill").textContent = `🔥 ${s} يوم`;
}

      <div>

          <div class="tile-title">${section.title}</div>
          <div class="ring" style="--p:${percent}"><span>${percent}%</span></div>
        </div>
        <div class="tile-sub">${done} / ${total} مكتمل</div>
        <div class="tile-bar"><div class="tile-bar-fill" style="width:${percent}%"></div></div>
      </div>
    `;
    const altBtn = tile.querySelector(".tile-dash-btn");
    if(getViewMode()==="list"){
      altBtn.textContent = "📈"; altBtn.title = "لوحة تفصيلية";
    } else {
      altBtn.textContent = "📋"; altBtn.title = "القائمة الكاملة";
    }
    tile.addEventListener("click", ()=>{
      if(getViewMode()==="list") openModal(section.id);
      else openSectionDashboard(section.id);
    });
    altBtn.addEventListener("click",(e)=>{
      e.stopPropagation();
      if(getViewMode()==="list") openSectionDashboard(section.id);
      else openModal(section.id);
    });
    gridEl.appendChild(tile);
  });
}

/* ================= SECTION MODAL ================= */
const overlay = document.getElementById("overlay");
const modalBody = document.getElementById("modalBody");

function openModal(sectionId, filter="", highlightTi=null, highlightPi=null){
  const section = DATA.find(s=>s.id===sectionId);
  if(!section) return;
  currentSectionId = sectionId;
  const {total, done} = countTotals(section);
  document.getElementById("modalIcon").textContent = section.icon;
  document.getElementById("modalIcon").style.background = section.color+"33";
  document.getElementById("modalTitle").textContent = section.title;
  document.getElementById("modalSub").textContent = `${done} / ${total} مكتمل`;
  renderModalBody(section, filter, highlightTi, highlightPi);
  overlay.classList.add("open");
}
function closeModal(){ overlay.classList.remove("open"); currentSectionId = null; }
document.getElementById("closeModal").addEventListener("click", closeModal);
document.getElementById("backModal").addEventListener("click", closeModal);
overlay.addEventListener("click",(e)=>{ if(e.target===overlay) closeModal(); });

function renderModalBody(section, filter="", highlightTi=null, highlightPi=null){
  modalBody.innerHTML = "";
  let anyVisible = false;

  section.themes.forEach((theme, ti)=>{
    if(isThemeHidden(section.id, ti)) return;
    const filtered = theme.topics
      .map((tp,pi)=>({tp,pi}))
      .filter(o=> !isTopicHidden(section.id, ti, o.pi))
      .filter(o=> o.tp.toLowerCase().includes(filter.toLowerCase()));
    if(filter && filtered.length===0) return;
    anyVisible = true;

    const themeBlock = document.createElement("div");
    themeBlock.className = "theme-block";
    const ts = themeStats(section, ti);
    const themePct = ts.total? Math.round(ts.done/ts.total*100):0;
    const themeHead = document.createElement("div");
    themeHead.className = "theme-head";
    themeHead.style.setProperty("--dc", section.color);
    themeHead.innerHTML = `
      <span class="theme-chevron">▾</span>
      <div class="theme-name" style="margin:0;border-inline-start:4px solid var(--accent);">${theme.name}</div>
      <div class="theme-mini-bar"><div class="theme-mini-fill" style="width:${themePct}%"></div></div>
      <span class="theme-mini-badge">${ts.done}/${ts.total}</span>
      <button class="theme-dash-mini" title="لوحة هذا المحور">📊</button>
    `;
    themeBlock.appendChild(themeHead);

    const topicsWrap = document.createElement("div");
    topicsWrap.className = "theme-topics";
    const isOpen = !!filter || (highlightTi !== null && ti === highlightTi);
    if(isOpen){ themeHead.classList.add("expanded"); topicsWrap.classList.add("open"); }

    themeHead.addEventListener("click", (e)=>{
      if(e.target.closest(".theme-dash-mini")) return;
      themeHead.classList.toggle("expanded");
      topicsWrap.classList.toggle("open");
    });
    themeHead.querySelector(".theme-dash-mini").addEventListener("click", (e)=>{
      e.stopPropagation();
      openThemeDashboard(section.id, ti);
    });

    const list = filter ? filtered : theme.topics.map((tp,pi)=>({tp,pi})).filter(o=> !isTopicHidden(section.id, ti, o.pi));

    list.forEach(({tp,pi})=>{
      const key = topicKey(section.id, ti, pi);
      const isDone = !!progress[key];
      const resCount = (resources[key]||[]).length;

      const wrap = document.createElement("div");
      wrap.className = "topic-wrap";

      const row = document.createElement("div");
      row.className = "topic-row" + (isDone? " done":"");
      const cbId = "cb-"+key;
      if(highlightTi !== null && ti === highlightTi && pi === highlightPi){
        row.classList.add("highlight-flash");
        row.dataset.jumpTarget = "1";
      }
      row.innerHTML = `
        <input type="checkbox" id="${cbId}" ${isDone?"checked":""}>
        <label for="${cbId}">${tp}</label>
        <button class="res-toggle" title="المصادر والمرفقات">📎${resCount? `<span class="count">${resCount}</span>`:""}</button>
      `;
      row.querySelector("input").addEventListener("change",(e)=>{
        if(e.target.checked){ progress[key]=Date.now(); row.classList.add("done"); logActivity(); }
        else { const oldTs = progress[key]; delete progress[key]; row.classList.remove("done"); unlogActivity(oldTs); }
        saveProgress();
        document.getElementById("modalSub").textContent = (()=>{
          const c = countTotals(section); return `${c.done} / ${c.total} مكتمل`;
        })();
      });

      const panel = buildResourcePanel(key);
      wireResToggle(row.querySelector(".res-toggle"), panel, key);

      wrap.appendChild(row);
      wrap.appendChild(panel);
      topicsWrap.appendChild(wrap);
    });

    themeBlock.appendChild(topicsWrap);
    modalBody.appendChild(themeBlock);
  });

  if(filter && !anyVisible){
    modalBody.innerHTML = `<div class="empty-state">لا توجد نتائج مطابقة في هذا القسم</div>`;
  }

  if(highlightTi !== null && highlightPi !== null){
    const target = modalBody.querySelector('[data-jump-target="1"]');
    if(target){
      setTimeout(()=> target.scrollIntoView({behavior:"smooth", block:"center"}), 120);
    }
  }
}

document.getElementById("markAllBtn").addEventListener("click", ()=>{
  const section = DATA.find(s=>s.id===currentSectionId);
  if(!section) return;
  section.themes.forEach((th,ti)=>{
    if(isThemeHidden(section.id, ti)) return;
    th.topics.forEach((tp,pi)=>{
      if(isTopicHidden(section.id, ti, pi)) return;
      const k = topicKey(section.id,ti,pi);
      if(!progress[k]) logActivity();
      progress[k]=Date.now();
    });
  });
  saveProgress();
  openModal(section.id);
  showToast("تم تحديد جميع مواضيع "+section.title);
});
document.getElementById("clearAllBtn").addEventListener("click", ()=>{
  const section = DATA.find(s=>s.id===currentSectionId);
  if(!section) return;
  section.themes.forEach((th,ti)=>{
    if(isThemeHidden(section.id, ti)) return;
    th.topics.forEach((tp,pi)=>{
      if(isTopicHidden(section.id, ti, pi)) return;
      const k = topicKey(section.id,ti,pi);
      const oldTs = progress[k];
      delete progress[k];
      unlogActivity(oldTs);
    });
  });
  saveProgress();
  openModal(section.id);
  showToast("تم إلغاء تحديد "+section.title);
});

/* ---- Resource panel builder (shared) ---- */
/* Cheap skeleton — the heavy tabs/forms/list are only built the first time
   the user actually opens a panel (see populateResourcePanel below). This
   keeps large sections (100+ topics) fast to render. */
function buildResourcePanel(key){
  const panel = document.createElement("div");
  panel.className = "res-panel";
  panel.dataset.key = key;
  return panel;
}
function wireResToggle(btn, panel, key){
  btn.addEventListener("click", ()=>{
    if(!panel.dataset.built){
      populateResourcePanel(panel, key);
      panel.dataset.built = "1";
    }
    panel.classList.toggle("open");
  });
}
/* ---- Dedicated per-topic resource modal (opened directly from a chip card) ---- */
const resourceOverlay = document.getElementById("resourceOverlay");
let _resourceModalOnClose = null;
function _closeResourceModal(){
  resourceOverlay.classList.remove("open");
  if(_resourceModalOnClose){ const cb = _resourceModalOnClose; _resourceModalOnClose = null; cb(); }
}
document.getElementById("closeResourceModal").addEventListener("click", _closeResourceModal);
resourceOverlay.addEventListener("click", (e)=>{ if(e.target===resourceOverlay) _closeResourceModal(); });
function openResourceModal(key, topicLabel, contextLabel, onClose){
  document.getElementById("resourceTitle").textContent = topicLabel;
  document.getElementById("resourceSub").textContent = contextLabel || "";
  const body = document.getElementById("resourceModalBody");
  body.innerHTML = "";
  const panel = document.createElement("div");
  panel.className = "res-panel open";
  populateResourcePanel(panel, key);
  body.appendChild(panel);
  _resourceModalOnClose = onClose || null;
  resourceOverlay.classList.add("open");
}

function populateResourcePanel(panel, key){
  const list = document.createElement("div");
  list.className = "res-list";
  renderResList(list, key);
  panel.appendChild(list);

  const tabs = document.createElement("div");
  tabs.className = "res-add-row";
  tabs.innerHTML = `
    <button class="res-tab active" data-type="link">🔗 رابط</button>
    <button class="res-tab" data-type="note">📝 ملاحظة</button>
    <button class="res-tab" data-type="file">📄 ملف / PDF</button>
  `;
  panel.appendChild(tabs);

  const formLink = document.createElement("div");
  formLink.className = "res-form active";
  formLink.innerHTML = `
    <input type="text" placeholder="اسم المصدر (اختياري)" class="rf-title">
    <input type="url" placeholder="https://..." class="rf-url">
    <button class="rf-add">إضافة</button>
  `;
  const formNote = document.createElement("div");
  formNote.className = "res-form";
  formNote.innerHTML = `
    <textarea placeholder="اكتب ملاحظتك هنا..." class="rf-note"></textarea>
    <button class="rf-add">إضافة</button>
  `;
  const formFile = document.createElement("div");
  formFile.className = "res-form";
  formFile.innerHTML = `
    <input type="text" placeholder="اسم الملف (اختياري)" class="rf-title">
    <input type="file" class="rf-file">
    <button class="rf-add">رفع</button>
  `;
  panel.appendChild(formLink);
  panel.appendChild(formNote);
  panel.appendChild(formFile);

  tabs.querySelectorAll(".res-tab").forEach(tab=>{
    tab.addEventListener("click",()=>{
      tabs.querySelectorAll(".res-tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");
      [formLink,formNote,formFile].forEach(f=>f.classList.remove("active"));
      if(tab.dataset.type==="link") formLink.classList.add("active");
      if(tab.dataset.type==="note") formNote.classList.add("active");
      if(tab.dataset.type==="file") formFile.classList.add("active");
    });
  });

  formLink.querySelector(".rf-add").addEventListener("click", ()=>{
    const url = formLink.querySelector(".rf-url").value.trim();
    if(!url){ showToast("الرجاء إدخال رابط"); return; }
    const title = formLink.querySelector(".rf-title").value.trim() || url;
    addResource(key, {id:genId(), type:"link", title, content:url});
    renderResList(list, key);
    refreshResCount(key);
    formLink.querySelector(".rf-url").value = "";
    formLink.querySelector(".rf-title").value = "";
    showToast("تم إضافة الرابط");
  });

  formNote.querySelector(".rf-add").addEventListener("click", ()=>{
    const text = formNote.querySelector(".rf-note").value.trim();
    if(!text){ showToast("الرجاء كتابة ملاحظة"); return; }
    addResource(key, {id:genId(), type:"note", title:text.slice(0,40)+(text.length>40?"…":""), content:text});
    renderResList(list, key);
    refreshResCount(key);
    formNote.querySelector(".rf-note").value = "";
    showToast("تم إضافة الملاحظة");
  });

  formFile.querySelector(".rf-add").addEventListener("click", async ()=>{
    const fileInput = formFile.querySelector(".rf-file");
    const file = fileInput.files[0];
    if(!file){ showToast("الرجاء اختيار ملف"); return; }
    const addBtn = formFile.querySelector(".rf-add");
    addBtn.disabled = true; addBtn.textContent = "جارٍ الرفع...";
    try{
      const stored = await storeFile(file);
      const title = formFile.querySelector(".rf-title").value.trim() || file.name;
      const resItem = {id:stored.id, type:"file", title, fileName:file.name, fileType:file.type};
      if(stored.inline) resItem.dataUrl = stored.dataUrl;
      addResource(key, resItem);
      renderResList(panel.querySelector(".res-list"), key);
      refreshResCount(key);
      fileInput.value = "";
      formFile.querySelector(".rf-title").value = "";
      showToast("تم رفع الملف");
    }catch(err){
      showToast("تعذر حفظ الملف: " + (err && err.message ? err.message : "خطأ غير معروف"));
    }finally{
      addBtn.disabled = false; addBtn.textContent = "رفع";
    }
  });
}

function addResource(key, item){
  if(!resources[key]) resources[key] = [];
  resources[key].push(item);
  saveResources();
}
async function removeResource(key, id, type){
  resources[key] = (resources[key]||[]).filter(r=>r.id!==id);
  if(resources[key].length===0) delete resources[key];
  saveResources();
  if(type==="file"){ try{ await deleteFileBlob(id); }catch(e){} }
}
function refreshResCount(key){
  document.querySelectorAll(`#cb-${CSS.escape(key)}`).forEach(cb=>{
    const row = cb.closest(".topic-row");
    if(!row) return;
    const btn = row.querySelector(".res-toggle");
    const n = (resources[key]||[]).length;
    btn.innerHTML = `📎${n? `<span class="count">${n}</span>`:""}`;
  });
}
function renderResList(listEl, key){
  listEl.innerHTML = "";
  const items = resources[key] || [];
  if(items.length===0){
    listEl.innerHTML = `<div class="res-empty">لا توجد مصادر مضافة لهذا الموضوع بعد.</div>`;
    return;
  }
  items.forEach(item=>{
    const row = document.createElement("div");
    row.className = "res-item";
    let icon = "🔗", body = "";
    if(item.type==="link"){
      icon = "🔗";
      body = `<a href="${item.content}" target="_blank" rel="noopener" class="res-title">${item.title}</a>`;
    } else if(item.type==="note"){
      icon = "📝";
      body = `<span class="res-title" title="${escapeHtml(item.content)}">${item.title}</span>`;
    } else if(item.type==="file"){
      icon = "📄";
      body = `<a href="#" class="res-title res-file-link">${item.title}</a>`;
    }
    row.innerHTML = `<span class="res-icon">${icon}</span>${body}<button class="res-del" title="حذف">🗑️</button>`;

    if(item.type==="file"){
      row.querySelector(".res-file-link").addEventListener("click", async (e)=>{
        e.preventDefault();
        openFileItem(item);
      });
    }
    if(item.type==="note"){
      row.querySelector(".res-title").addEventListener("click", ()=> customAlert("📝 ملاحظة", item.content));
      row.style.cursor="pointer";
    }
    row.querySelector(".res-del").addEventListener("click", async ()=>{
      await removeResource(key, item.id, item.type);
      renderResList(listEl, key);
      refreshResCount(key);
      renderGrid();
    });
    listEl.appendChild(row);
  });
}
function escapeHtml(str){
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}
function keyInfo(key){
  const [sid, ti, pi] = key.split("__");
  const section = DATA.find(s=>s.id===sid);
  if(!section) return null;
  const theme = section.themes[+ti];
  if(!theme) return null;
  const topic = theme.topics[+pi];
  return {section, theme, topic};
}

/* ================= GENERIC MODAL (stats/incomplete/files/settings/dashboards) ================= */
const overlay2 = document.getElementById("overlay2");
const modal2Body = document.getElementById("modal2Body");
let modal2Stack = [];
let currentModal2State = null;

function _renderModal2State(cfg){
  document.getElementById("modal2Icon").textContent = cfg.icon;
  document.getElementById("modal2Icon").style.background = cfg.iconBg || "rgba(255,255,255,.12)";
  document.getElementById("modal2Title").textContent = cfg.title;
  document.getElementById("modal2Sub").textContent = cfg.sub || "";
  modal2Body.innerHTML = "";
  cfg.renderFn(modal2Body);
  overlay2.classList.add("open");
  document.getElementById("modal2Back").style.display = modal2Stack.length ? "flex" : "none";
}
/* Fresh entry point (dock buttons, tile clicks) — resets any back history. */
function openGenericModal(cfg){
  modal2Stack = [];
  currentModal2State = cfg;
  _renderModal2State(cfg);
}
/* Drill-down navigation (e.g. section dashboard -> theme dashboard) — keeps
   the previous view reachable via the back arrow. */
function pushGenericModal(cfg){
  if(overlay2.classList.contains("open") && currentModal2State){
    modal2Stack.push(currentModal2State);
  }
  currentModal2State = cfg;
  _renderModal2State(cfg);
}
function goBackModal2(){
  if(modal2Stack.length){
    const prev = modal2Stack.pop();
    currentModal2State = prev;
    _renderModal2State(prev);
  } else {
    closeModal2();
  }
}
function closeModal2(){
  overlay2.classList.remove("open");
  modal2Stack = [];
  currentModal2State = null;
}
document.getElementById("closeModal2").addEventListener("click", closeModal2);
document.getElementById("modal2Back").addEventListener("click", goBackModal2);
overlay2.addEventListener("click",(e)=>{ if(e.target===overlay2) closeModal2(); });

/* ---- Pro Dashboard (per-section detailed analytics) ---- */
function openSectionDashboard(sectionId){
  const section = DATA.find(s=>s.id===sectionId);
  if(!section) return;
  openGenericModal({
    icon: section.icon, iconBg: section.color+"33",
    title: section.title, sub: "لوحة تفصيلية",
    renderFn: (c)=> renderSectionDashboard(c, section)
  });
}

function renderSectionDashboard(container, section){
  container.innerHTML = "";
  const {total, done} = countTotals(section);
  const percent = total? Math.round((done/total)*100) : 0;
  const resCount = sectionResourceCount(section);
  const lastTs = sectionLastStudied(section);
  const themeCount = section.themes.filter((th,ti)=> !isThemeHidden(section.id, ti)).length;

  /* Hero */
  const hero = document.createElement("div");
  hero.className = "dash-hero";
  hero.style.setProperty("--dc", section.color);
  hero.innerHTML = `
    <div class="dash-hero-top">
      <div class="dash-hero-icon">${section.icon}</div>
      <div>
        <div class="dash-hero-title">${section.title}</div>
        <div class="dash-hero-sub">${themeCount} محاور — ${total} موضوع</div>
      </div>
      <div class="dash-ring-big" style="--p:${percent}"><span>${percent}%</span></div>
    </div>
    <div class="dash-quick">
      <div class="dash-quick-card"><div class="n">${done}</div><div class="l">مكتمل</div></div>
      <div class="dash-quick-card"><div class="n">${total-done}</div><div class="l">متبقي</div></div>
      <div class="dash-quick-card"><div class="n">${resCount}</div><div class="l">مصادر مرفقة</div></div>
      <div class="dash-quick-card"><div class="n">${formatRelativeDate(lastTs)}</div><div class="l">آخر مذاكرة</div></div>
    </div>
  `;
  container.appendChild(hero);

  /* Section-level bulk actions */
  const sBulkRow = document.createElement("div");
  sBulkRow.className = "settings-row";
  sBulkRow.style.marginBottom = "18px";
  sBulkRow.innerHTML = `
    <button class="mini-btn" id="secMarkAll">✔️ تحديد كل مواضيع القسم</button>
    <button class="mini-btn" id="secClearAll">↺ إلغاء تحديد الكل</button>
    <button class="mini-btn" id="secIncompleteDash">📋 غير المكتمل</button>
  `;
  sBulkRow.querySelector("#secMarkAll").addEventListener("click", ()=>{
    section.themes.forEach((th,ti)=>{
      if(isThemeHidden(section.id, ti)) return;
      th.topics.forEach((tp,pi)=>{
        if(isTopicHidden(section.id, ti, pi)) return;
        const k = topicKey(section.id,ti,pi);
        if(!progress[k]) logActivity();
        progress[k] = Date.now();
      });
    });
    saveProgress();
    renderSectionDashboard(container, section);
  });
  sBulkRow.querySelector("#secClearAll").addEventListener("click", ()=>{
    section.themes.forEach((th,ti)=>{
      if(isThemeHidden(section.id, ti)) return;
      th.topics.forEach((tp,pi)=>{
        if(isTopicHidden(section.id, ti, pi)) return;
        const k = topicKey(section.id,ti,pi);
        const oldTs = progress[k];
        delete progress[k];
        unlogActivity(oldTs);
      });
    });
    saveProgress();
    renderSectionDashboard(container, section);
  });
  sBulkRow.querySelector("#secIncompleteDash").addEventListener("click", ()=>{
    pushGenericModal({
      icon:"📋", title:"غير المكتمل — "+section.title, sub:"كل ما تبقى عليك مذاكرته في هذا القسم",
      renderFn: (c)=> renderIncompleteView(c, section.id)
    });
  });
  container.appendChild(sBulkRow);

  /* Extra stat cards */
  const bestTheme = section.themes.map((th,ti)=>{
    if(isThemeHidden(section.id, ti)) return null;
    const ts = themeStats(section, ti);
    return {name:th.name, done:ts.done, total:ts.total, pct: ts.total? Math.round(ts.done/ts.total*100):0};
  }).filter(Boolean).sort((a,b)=>b.pct-a.pct);
  const strongest = bestTheme[0];
  const weakest = [...bestTheme].sort((a,b)=>a.pct-b.pct)[0];

  const statGrid = document.createElement("div");
  statGrid.className = "dash-stat-grid";
  statGrid.innerHTML = `
    <div class="dash-stat"><div class="n">${themeCount}</div><div class="l">عدد المحاور</div></div>
    <div class="dash-stat"><div class="n">${strongest ? strongest.pct+"%" : "—"}</div><div class="l">أقوى محور: ${strongest?strongest.name:"—"}</div></div>
    <div class="dash-stat"><div class="n">${weakest ? weakest.pct+"%" : "—"}</div><div class="l">يحتاج مذاكرة: ${weakest?weakest.name:"—"}</div></div>
    <div class="dash-stat"><div class="n">${percent}%</div><div class="l">نسبة الإنجاز الكلية</div></div>
  `;
  container.appendChild(statGrid);

  /* Theme breakdown table */
  const tTitle = document.createElement("div");
  tTitle.className = "dash-section-title";
  tTitle.textContent = "📚 التقدم حسب المحاور";
  container.appendChild(tTitle);

  const table = document.createElement("div");
  table.className = "theme-table";
  section.themes.forEach((th, ti)=>{
    if(isThemeHidden(section.id, ti)) return;
    const ts = themeStats(section, ti);
    const pct = ts.total? Math.round(ts.done/ts.total*100):0;
    const row = document.createElement("div");
    row.className = "theme-row";
    row.style.setProperty("--dc", section.color);
    row.style.cursor = "pointer";
    row.innerHTML = `
      <div class="tname">${th.name}</div>
      <div class="tbar"><div class="tbar-fill" style="width:${pct}%"></div></div>
      <div class="tcount">${ts.done}/${ts.total}</div>
    `;
    row.addEventListener("click", ()=> openThemeDashboard(section.id, ti));
    table.appendChild(row);
  });
  container.appendChild(table);

  /* Recent completions */
  const rTitle = document.createElement("div");
  rTitle.className = "dash-section-title";
  rTitle.textContent = "🕒 آخر المواضيع المذاكرة";
  container.appendChild(rTitle);

  const recent = sectionRecentCompletions(section, 8);
  const rTable = document.createElement("div");

function renderThemeDashboard(container, section, ti){
  container.innerHTML = "";
  const theme = section.themes[ti];
  const ts = themeStats(section, ti);
  const pct = ts.total? Math.round(ts.done/ts.total*100):0;

  /* Mini hero */

  hero.className = "dash-hero";
  hero.style.setProperty("--dc", section.color);

      <div>
        <div class="dash-hero-title" style="font-size:17px;">${theme.name}</div>

      </div>
      <div class="dash-ring-big" style="width:78px;height:78px;--p:${pct}"><span style="font-size:16px;">${pct}%</span></div>
    </div>
    <div class="dash-quick">
      <div class="dash-quick-card"><div class="n">${ts.done}</div><div class="l">مكتمل</div></div>
      <div class="dash-quick-card"><div class="n">${ts.total-ts.done}</div><div class="l">متبقي</div></div>
      <div class="dash-quick-card"><div class="n">${ts.resCount}</div><div class="l">مصادر</div></div>
      <div class="dash-quick-card"><div class="n">${formatRelativeDate(ts.lastTs)}</div><div class="l">آخر مذاكرة</div></div>
    </div>
  `;
  container.appendChild(hero);

  /* Theme-level bulk actions */
  const bulkRow = document.createElement("div");
  bulkRow.className = "settings-row";
  bulkRow.style.marginBottom = "18px";
  bulkRow.innerHTML = `
    <button class="mini-btn" id="themeMarkAll">✔️ تحديد الكل</button>
    <button class="mini-btn" id="themeClearAll">↺ إلغاء الكل</button>
  `;
  bulkRow.querySelector("#themeMarkAll").addEventListener("click", ()=>{
    ts.topics.forEach(t=>{
      if(!progress[t.key]) logActivity();
      progress[t.key] = Date.now();
    });
    saveProgress();
    renderThemeDashboard(container, section, ti);
  });
  bulkRow.querySelector("#themeClearAll").addEventListener("click", ()=>{
    ts.topics.forEach(t=>{
      const oldTs = progress[t.key];
      delete progress[t.key];
      unlogActivity(oldTs);
    });
    saveProgress();
    renderThemeDashboard(container, section, ti);
  });
  container.appendChild(bulkRow);

  /* Quick toggle chip grid */
  const chipTitle = document.createElement("div");
  chipTitle.className = "dash-section-title";
  chipTitle.textContent = "⚡ نظرة سريعة — دوس على أي بطاقة للتحديد";
  container.appendChild(chipTitle);

  const chipGrid = document.createElement("div");
  chipGrid.className = "chip-grid";
  chipGrid.style.setProperty("--dc", section.color);
  ts.topics.forEach(t=>{
    const chip = document.createElement("div");
    chip.className = "topic-chip" + (t.isDone ? " done":"");
    chip.style.setProperty("--dc", section.color);
    chip.innerHTML = `
      <div class="chip-top">
        <div class="chip-status">✓</div>
        <button class="chip-res-btn" title="المصادر والمرفقات">📎${t.resCount ? `<span class="count">${t.resCount}</span>` : ""}</button>
      </div>
      <div class="chip-label">${t.tp}</div>
    `;
    chip.addEventListener("click", ()=>{
      if(progress[t.key]){ const oldTs = progress[t.key]; delete progress[t.key]; unlogActivity(oldTs); }
      else { progress[t.key] = Date.now(); logActivity(); }
      saveProgress();
      renderThemeDashboard(container, section, ti);
    });
    chip.querySelector(".chip-res-btn").addEventListener("click", (e)=>{
      e.stopPropagation();
      openResourceModal(t.key, t.tp, theme.name, ()=> renderThemeDashboard(container, section, ti));
    });
    chipGrid.appendChild(chip);
  });
  container.appendChild(chipGrid);

  const openBtn = document.createElement("button");
  openBtn.className = "mini-btn";
  openBtn.style.marginTop = "6px";
  openBtn.textContent = "📊 لوحة القسم الكاملة";

function renderStatsView(container){
  container.innerHTML = "";
  const streak = computeStreak();
  const today = activity[todayStr()] || 0;
  const week = sumLastNDays(7);
  const month = sumThisMonth();

  const cards = document.createElement("div");
  cards.className = "stat-cards";
  cards.innerHTML = `
    <div class="stat-card"><div class="num">${today}</div><div class="lbl">اليوم</div></div>
    <div class="stat-card"><div class="num">${week}</div><div class="lbl">آخر 7 أيام</div></div>
    <div class="stat-card"><div class="num">${month}</div><div class="lbl">هذا الشهر</div></div>
    <div class="stat-card"><div class="num">🔥${streak}</div><div class="lbl">أيام الاستمرارية</div></div>
  `;
  container.appendChild(cards);

  const heatTitle = document.createElement("div");
  heatTitle.className = "theme-name";
  heatTitle.textContent = "سجل النشاط (آخر 10 أسابيع)";
  container.appendChild(heatTitle);

  const heatWrap = document.createElement("div");
  heatWrap.className = "heatmap-wrap";
  const heat = document.createElement("div");
  heat.className = "heatmap";

  const days = 70;
  const cellsData = [];
  const d = new Date();
  for(let i=days-1;i>=0;i--){
    const dt = new Date();
    dt.setDate(d.getDate()-i);
    const ds = todayStr(dt);
    cellsData.push({date:ds, count:activity[ds]||0});
  }
  // pad start so grid begins on a Sunday-aligned column
  const firstDow = new Date(cellsData[0].date).getDay();
  for(let i=0;i<firstDow;i++){
    const c = document.createElement("div");
    c.className = "hcell";
    c.style.visibility = "hidden";
    heat.appendChild(c);
  }
  cellsData.forEach(c=>{
    const cell = document.createElement("div");
    cell.className = "hcell";
    let lvl = 0;
    if(c.count>=6) lvl=4; else if(c.count>=4) lvl=3; else if(c.count>=2) lvl=2; else if(c.count>=1) lvl=1;
    cell.dataset.lvl = lvl;
    cell.title = `${c.date} — ${c.count} موضوع`;
    heat.appendChild(cell);
  });
  heatWrap.appendChild(heat);
  container.appendChild(heatWrap);

  const legend = document.createElement("div");
  legend.className = "heatmap-legend";
  legend.innerHTML = `<span>أقل</span>
    <div class="hcell" data-lvl="0"></div>
    <div class="hcell" data-lvl="1"></div>
    <div class="hcell" data-lvl="2"></div>
    <div class="hcell" data-lvl="3"></div>
    <div class="hcell" data-lvl="4"></div>
    <span>أكثر</span>`;
  container.appendChild(legend);
}

function renderIncompleteView(container, onlySectionId){
  container.innerHTML = "";
  let anyLeft = false;
  const sections = onlySectionId ? DATA.filter(s=>s.id===onlySectionId) : DATA;
  sections.forEach(section=>{
    const rowsHtml = [];
    section.themes.forEach((theme, ti)=>{
      if(isThemeHidden(section.id, ti)) return;
      theme.topics.forEach((tp, pi)=>{
        if(isTopicHidden(section.id, ti, pi)) return;
        const key = topicKey(section.id, ti, pi);
        if(!progress[key]) rowsHtml.push({key, tp, themeName:theme.name});
      });
    });
    if(rowsHtml.length===0) return;
    anyLeft = true;

    const groupWrap = document.createElement("div");
    groupWrap.style.marginBottom = "18px";
    const head = document.createElement("div");
    head.style.cssText = "display:flex;align-items:center;gap:10px;margin-bottom:8px;";
    head.innerHTML = `<div class="tile-icon" style="width:32px;height:32px;font-size:15px;background:${section.color}33">${section.icon}</div>
      <div style="font-weight:800;font-size:14.5px;">${section.title}</div>
      <span style="color:var(--muted);font-size:12px;margin-inline-start:auto;">${rowsHtml.length} متبقي</span>`;
    groupWrap.appendChild(head);

    rowsHtml.forEach(({key,tp,themeName})=>{
      const row = document.createElement("div");
      row.className = "topic-row";
      const cbId = "inc-"+key;
      row.innerHTML = `
        <input type="checkbox" id="${cbId}">
        <label for="${cbId}">${tp}<span class="ctx">${themeName}</span></label>
      `;
      row.querySelector("input").addEventListener("change",(e)=>{
        if(e.target.checked){
          progress[key]=Date.now(); logActivity(); saveProgress();
          row.style.opacity=".4";
          setTimeout(()=>{ renderIncompleteView(container, onlySectionId); }, 250);
        }
      });
      groupWrap.appendChild(row);
    });
    container.appendChild(groupWrap);
  });
  container.querySelectorAll(".empty-state").forEach(e=>e.remove());
  if(!anyLeft){
    container.innerHTML = `<div class="empty-state">🎉 ما شاء الله، خلّصت كل المواضيع!</div>`;
  }
}

function renderFilesView(container){
  container.innerHTML = "";
  const bySection = {};
  Object.keys(resources).forEach(key=>{
    const info = keyInfo(key);
    if(!info) return;
    const items = resources[key];
    if(!items || items.length===0) return;
    if(!bySection[info.section.id]) bySection[info.section.id] = {section:info.section, entries:[]};
    items.forEach(item=>{
      bySection[info.section.id].entries.push({item, theme:info.theme.name, topic:info.topic, key});
    });
  });

  const sectionIds = Object.keys(bySection);
  if(sectionIds.length===0){
    container.innerHTML = `<div class="empty-state">لسه معملتش رفع لأي ملفات أو روابط أو ملاحظات.<br>افتح أي موضوع واضغط 📎 عشان تضيف مصدر.</div>`;
    return;
  }

  sectionIds.forEach(sid=>{
    const {section, entries} = bySection[sid];
    const group = document.createElement("div");
    group.className = "file-group";
    group.innerHTML = `<h4><span class="tile-icon" style="width:28px;height:28px;font-size:13px;background:${section.color}33">${section.icon}</span>${section.title} <span style="color:var(--muted);font-weight:600;">(${entries.length})</span></h4>`;

    const list = document.createElement("div");
    list.className = "res-list";
    entries.forEach(({item, theme, topic, key})=>{
      const row = document.createElement("div");
      row.className = "res-item";
      let icon = item.type==="link"?"🔗":item.type==="note"?"📝":"📄";
      let body = "";
      if(item.type==="link"){
        body = `<div style="flex:1;min-width:0;"><a href="${item.content}" target="_blank" rel="noopener" class="res-title" style="display:block;">${item.title}</a><span class="ctx">${theme} — ${topic}</span></div>`;
      } else if(item.type==="note"){
        body = `<div style="flex:1;min-width:0;cursor:pointer;" class="note-open"><span class="res-title" style="display:block;">${item.title}</span><span class="ctx">${theme} — ${topic}</span></div>`;
      } else {
        body = `<div style="flex:1;min-width:0;cursor:pointer;" class="file-open"><span class="res-title" style="display:block;">${item.title}</span><span class="ctx">${theme} — ${topic}</span></div>`;
      }
      row.innerHTML = `<span class="res-icon">${icon}</span>${body}`;
      if(item.type==="note"){
        row.querySelector(".note-open").addEventListener("click", ()=> customAlert("📝 ملاحظة", item.content));
      }
      if(item.type==="file"){
        row.querySelector(".file-open").addEventListener("click", ()=>{
          openFileItem(item);
        });
      }
      list.appendChild(row);
    });
    group.appendChild(list);
    container.appendChild(group);
  });
}

/* ================= POMODORO + PLANT GARDEN ================= */
const GARDEN_KEY = "emle_garden_v1";
let garden = JSON.parse(localStorage.getItem(GARDEN_KEY) || "[]");
function saveGarden(){ localStorage.setItem(GARDEN_KEY, JSON.stringify(garden)); }
function addPlantToGarden(emoji){
  garden.push({type:emoji, ts:Date.now()});
  saveGarden();
  renderGarden();
}
function renderGarden(){
  const wrap = document.getElementById("gardenPlants");
  const countEl = document.getElementById("gardenCount");
  if(!wrap || !countEl) return;
  countEl.textContent = garden.length + " نبتة";
  wrap.innerHTML = garden.length
    ? garden.map(p=>`<span class="garden-plant">${p.type}</span>`).join("")
    : `<span class="garden-empty">أكمل جلسة بومودورو عشان تزرع أول نبتة 🌱</span>`;
}
function pickPlantForDuration(min){
  const short = ["🌱","🌿"];
  const medium = ["🌸","🌼","🍀"];
  const long = ["🌳","🌺","🌻","🌷"];
  const arr = min<=20 ? short : (min<=40 ? medium : long);
  return arr[Math.floor(Math.random()*arr.length)];
}

let pomodoroInterval = null;
let pomodoroRemaining = 0;
let pomodoroDurationMin = 25;
let pomodoroActive = false;
function clearPomodoroInterval(){
  if(pomodoroInterval){ clearInterval(pomodoroInterval); pomodoroInterval = null; }
}
function updatePomodoroBadge(){
  const badge = document.getElementById("pomodoroBadge");
  if(!badge) return;
  if(!pomodoroActive){ badge.classList.remove("active"); return; }
  const totalSec = pomodoroDurationMin*60;
  const pct = Math.round(((totalSec-pomodoroRemaining)/totalSec)*100);
  badge.style.setProperty("--p", pct);
  badge.classList.add("active");
}

document.getElementById("pomodoroBtn").addEventListener("click", ()=>{
  openGenericModal({
    icon:"🍅", title:"بومودورو", sub:"ركّز وازرع حديقتك",
    renderFn: pomodoroActive ? renderPomodoroRunning : renderPomodoroSetup
  });
});

function renderPomodoroSetup(container){
  container.innerHTML = `
    <div class="dash-section-title">⏱️ اختر مدة جلسة التركيز</div>
    <div class="settings-row" style="margin-bottom:14px;">
      <button class="mini-btn" data-min="15">15 دقيقة</button>
      <button class="mini-btn" data-min="25">25 دقيقة</button>
      <button class="mini-btn" data-min="45">45 دقيقة</button>
      <button class="mini-btn" data-min="60">60 دقيقة</button>
    </div>
    <div class="dash-section-title">⚙️ أو حدد عدد الدقائق بنفسك</div>
    <div class="fs-row" style="margin-bottom:20px;">
      <input type="number" min="1" max="180" value="25" id="pomodoroCustom"
        style="flex:1;padding:10px 12px;border-radius:10px;border:1px solid var(--glass-border);background:rgba(255,255,255,.08);color:var(--text);font-size:14px;">
      <button class="mini-btn" id="pomodoroCustomStart" title="ابدأ">✔️</button>
    </div>
    <div class="dash-section-title">🌷 حديقتك حتى الآن</div>
    <div class="garden-plants" id="pomodoroGardenPreview" style="min-height:30px;"></div>
  `;
  container.querySelectorAll("[data-min]").forEach(btn=>{
    btn.addEventListener("click", ()=> startPomodoro(parseInt(btn.dataset.min), container));
  });
  container.querySelector("#pomodoroCustomStart").addEventListener("click", ()=>{
    const v = parseInt(container.querySelector("#pomodoroCustom").value) || 25;
    startPomodoro(Math.max(1, Math.min(180, v)), container);
  });
  const preview = container.querySelector("#pomodoroGardenPreview");
  preview.innerHTML = garden.length
    ? garden.map(p=>`<span class="garden-plant">${p.type}</span>`).join("")
    : `<span class="garden-empty">لا نباتات بعد</span>`;
}

function startPomodoro(minutes, container){
  pomodoroDurationMin = minutes;
  pomodoroRemaining = minutes*60;
  pomodoroActive = true;
  renderPomodoroRunning(container);
  pomodoroInterval = setInterval(()=>{
    pomodoroRemaining--;
    updatePomodoroDisplay(container);
    updatePomodoroBadge();
    if(pomodoroRemaining<=0){
      clearPomodoroInterval();
      pomodoroActive = false;
      updatePomodoroBadge();
      completePomodoro(container);
    }
  }, 1000);
  updatePomodoroBadge();
}

function renderPomodoroRunning(container){
  container.innerHTML = `
    <div style="text-align:center;padding:10px 0 20px;">
      <div class="dash-ring-big" id="pomodoroRing" style="width:140px;height:140px;margin:0 auto 18px;--p:0;">
        <span id="pomodoroTimeLabel" style="font-size:26px;"></span>
      </div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:18px;">جلسة تركيز ${pomodoroDurationMin} دقيقة</div>
      <div class="settings-row" style="justify-content:center;">
        <button class="mini-btn" id="pomodoroBack">⬅ رجوع (يستمر بالخلفية)</button>
        <button class="mini-btn" id="pomodoroPauseResume">${pomodoroInterval ? "⏸️ إيقاف مؤقت" : "▶️ استكمال"}</button>
        <button class="mini-btn" id="pomodoroCancel" style="color:#ff6b6b;">✖ إلغاء</button>
      </div>
    </div>
  `;
  container.querySelector("#pomodoroBack").addEventListener("click", ()=>{
    closeModal2();
  });
  container.querySelector("#pomodoroCancel").addEventListener("click", ()=>{
    clearPomodoroInterval();
    pomodoroActive = false;
    updatePomodoroBadge();
    renderPomodoroSetup(container);
    showToast("تم إلغاء الجلسة");
  });
  container.querySelector("#pomodoroPauseResume").addEventListener("click", (e)=>{
    if(pomodoroInterval){
      clearPomodoroInterval();
      e.target.textContent = "▶️ استكمال";
    } else {
      pomodoroInterval = setInterval(()=>{
        pomodoroRemaining--;
        updatePomodoroDisplay(container);
        updatePomodoroBadge();
        if(pomodoroRemaining<=0){
          clearPomodoroInterval();
          pomodoroActive = false;
          updatePomodoroBadge();
          completePomodoro(container);
        }
      }, 1000);
      e.target.textContent = "⏸️ إيقاف مؤقت";
    }
  });
  updatePomodoroDisplay(container);
}

function updatePomodoroDisplay(container){
  const totalSec = pomodoroDurationMin*60;
  const pct = Math.round(((totalSec-pomodoroRemaining)/totalSec)*100);
  const ring = container.querySelector("#pomodoroRing");
  if(ring) ring.style.setProperty("--p", pct);
  const m = Math.floor(pomodoroRemaining/60);
  const s = pomodoroRemaining%60;
  const label = container.querySelector("#pomodoroTimeLabel");
  if(label) label.textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function completePomodoro(container){
  const plant = pickPlantForDuration(pomodoroDurationMin);
  addPlantToGarden(plant);
  container.innerHTML = `
    <div style="text-align:center;padding:20px 0;">

function getFontScale(){ return parseFloat(localStorage.getItem(FS_KEY) || "1"); }
function setFontScale(v){
  v = Math.max(0.8, Math.min(1.6, Math.round(v*100)/100));
